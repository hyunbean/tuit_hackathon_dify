    - data:
        code: "function main({ rawProductName, unitText, locale, marketCode, userContext\
          \ }) {\n  const original = rawProductName || \"\";\n  const unit = unitText\
          \ || \"\";\n  const lang = locale || \"\";\n  const market = marketCode\
          \ || \"\";\n  const context = userContext || \"\";\n\n  const normalized\
          \ = original\n    .toLowerCase()\n    .replace(/[’‘`]/g, \"'\")\n    .replace(/[“”]/g,\
          \ '\"')\n    .replace(/[^\\p{L}\\p{N}\\s'\"]/gu, \" \")\n    .replace(/\\\
          s+/g, \" \")\n    .trim();\n\n  const tokens = normalized\n    .split(\"\
          \ \")\n    .map((token) => token.trim())\n    .filter(Boolean);\n\n  const\
          \ normalizedUnit = unit\n    .toLowerCase()\n    .replace(/[’‘`]/g, \"'\"\
          )\n    .trim();\n\n  const searchQuery = [\n    `raw product name: ${original}`,\n\
          \    `clean product name: ${normalized}`,\n    `unit text: ${normalizedUnit}`,\n\
          \    `locale: ${lang}`,\n    `market code: ${market}`,\n    `user context:\
          \ ${context}`,\n    `tokens: ${tokens.join(\", \")}`\n  ]\n    .filter((line)\
          \ => !line.endsWith(\": \"))\n    .join(\"\\n\");\n\n  return {\n    cleanName:\
          \ normalized,\n    tokensJson: JSON.stringify(tokens),\n    cleanUnitText:\
          \ normalizedUnit,\n    searchQuery\n  };\n}"
        code_language: javascript
