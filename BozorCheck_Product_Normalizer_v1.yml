    - data:
        code: "function safeParseJson(text) {\n  if (!text) return null;\n\n  let\
          \ cleaned = String(text).trim();\n\n  cleaned = cleaned\n    .replace(/^```json\\\
          s*/i, \"\")\n    .replace(/^```\\s*/i, \"\")\n    .replace(/```$/i, \"\"\
          )\n    .trim();\n\n  try {\n    return JSON.parse(cleaned);\n  } catch (e)\
          \ {\n    return null;\n  }\n}\n\nfunction main({ llmText, rawProductName\
          \ }) {\n  const allowedCodes = [\n    \"TOMATO\",\n    \"CUCUMBER\",\n \
          \   \"CARROT\",\n    \"POTATO\",\n    \"ONION\",\n    \"APPLE\",\n    \"\
          RICE\",\n    \"EGGS\",\n    \"VEGETABLE_OIL\",\n    \"BEEF\",\n    \"UNKNOWN\"\
          \n  ];\n\n  const allowedUnits = [\"KG\", \"PCS_10\", \"LITER\", \"BUNDLE\"\
          , \"PCS\", \"UNKNOWN\"];\n\n  const raw = (rawProductName || \"\").toLowerCase();\n\
          \  const parsed = safeParseJson(llmText);\n\n  let result = parsed || {\n\
          \    standardProductCode: \"UNKNOWN\",\n    standardProductName: null,\n\
          \    variant: null,\n    normalizedUnitCode: \"UNKNOWN\",\n    matchConfidence:\
          \ 0.2,\n    needsHumanReview: true,\n    reason: \"Invalid JSON output.\
          \ Human review required.\"\n  };\n\n  if (!allowedCodes.includes(result.standardProductCode))\
          \ {\n    result.standardProductCode = \"UNKNOWN\";\n    result.standardProductName\
          \ = null;\n    result.variant = null;\n    result.matchConfidence = 0.2;\n\
          \    result.needsHumanReview = true;\n    result.reason = \"Unsupported\
          \ product code. Human review required.\";\n  }\n\n  if (!allowedUnits.includes(result.normalizedUnitCode))\
          \ {\n    result.normalizedUnitCode = \"UNKNOWN\";\n  }\n\n  const confidence\
          \ = Number(result.matchConfidence);\n  result.matchConfidence = Number.isFinite(confidence)\n\
          \    ? Math.max(0, Math.min(1, confidence))\n    : 0.2;\n\n  const genericUnknown\
          \ =\n    raw.includes(\"unknown\") &&\n    raw.includes(\"vegetable\") &&\n\
          \    !raw.includes(\"oil\") &&\n    !raw.includes(\"yog\") &&\n    !raw.includes(\"\
          масло\") &&\n    !raw.includes(\"sunflower\") &&\n    !raw.includes(\"cottonseed\"\
          );\n\n  if (genericUnknown) {\n    result.standardProductCode = \"UNKNOWN\"\
          ;\n    result.standardProductName = null;\n    result.variant = null;\n\
          \    result.normalizedUnitCode = result.normalizedUnitCode || \"UNKNOWN\"\
          ;\n    result.matchConfidence = Math.min(result.matchConfidence, 0.3);\n\
          \    result.needsHumanReview = true;\n    result.reason =\n      \"No reliable\
          \ product alias match. Generic vegetable words are not enough for automatic\
          \ matching.\";\n  }\n\n  if (result.standardProductCode === \"UNKNOWN\"\
          \ || result.matchConfidence < 0.65) {\n    result.needsHumanReview = true;\n\
          \  }\n\n  return {\n    standardProductCode: result.standardProductCode,\n\
          \    standardProductName: result.standardProductName || \"\",\n    variant:\
          \ result.variant || \"\",\n    normalizedUnitCode: result.normalizedUnitCode\
          \ || \"UNKNOWN\",\n    matchConfidence: result.matchConfidence,\n    needsHumanReview:\
          \ Boolean(result.needsHumanReview),\n    reason: result.reason || \"Product\
          \ normalization completed.\"\n  };\n}"
        code_language: javascript
