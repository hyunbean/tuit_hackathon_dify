          \ be reviewed before being used.\";\n\nreturn {\n  normalizedProductCode: normalizedProductCode || \"UNKNOWN\",\n\
          \  riskLevel: \"HIGH\",\n  statusSuggestion: \"REJECT_CANDIDATE\",\n  needsHumanReview: \"true\",\n  anomalyReasonsJson:\
          \ JSON.stringify([reason]),\n  reviewNote: `Reject candidate: ${reason} Submitted price: ${submittedPriceNumber}`,\n\
          \  userMessage,\n  operatorChecklistJson: JSON.stringify([\n    \"Check required input fields.\",\n    \"Check product\
          \ normalization result.\",\n    \"Do not use this report without manual review.\"\n  ])\n};\n}"
