          }\n\nfunction main({\n  productCode,\n  marketCode,\n  submittedPrice,\n  submittedUnit,\n  recentFairLow,\n  recentFairMid,\n\
          \  recentFairHigh,\n  matchConfidence\n}) {\n  const code = String(productCode || \"\").trim().toUpperCase();\n\
          \  const market = String(marketCode || \"\").trim().toUpperCase();\n  const unit = String(submittedUnit || \"\"\
          ).trim().toUpperCase();\n\n  const price = toNumber(submittedPrice, -1);\n  const fairLow = toNumber(recentFairLow,\
          \ 0);\n  const fairMid = toNumber(recentFairMid, 0);\n  const fairHigh = toNumber(recentFairHigh, 0);\n  const match\
          \ = toNumber(matchConfidence, 0);\n\n  let isValid = true;\n  let invalidReason = \"\";\n\n  if (!code || code ===\
          \ \"UNKNOWN\") {\n    isValid = false;\n    invalidReason = \"Unknown or missing product code.\";\n  } else if (!market)\
          \ {\n    isValid = false;\n    invalidReason = \"Missing market code.\";\n  } else if (!unit) {\n    isValid = false;\n\
          \    invalidReason = \"Missing submitted unit.\";\n  } else if (price <= 0) {\n    isValid = false;\n    invalidReason\
          \ = \"Submitted price must be greater than zero.\";\n  } else if (fairLow <= 0 || fairMid <= 0 || fairHigh <= 0)\
          \ {\n    isValid = false;\n    invalidReason = \"Missing recent fair price range.\";\n  }\n\n  if (match < 0.65)\
          \ {\n    isValid = false;\n    invalidReason = \"Low or missing product match confidence. Human review required.\"\
          ;\n  }\n\n  return {\n    isValid,\n    invalidReason,\n    normalizedProductCode: code || \"UNKNOWN\",\n    normalizedUnitCode:\
          \ unit || \"UNKNOWN\",\n    submittedPriceNumber: price,\n    fairLowNumber: fairLow,\n    fairMidNumber: fairMid,\n\
          \    fairHighNumber: fairHigh,\n    matchConfidenceNumber: match\n  };\n}"
