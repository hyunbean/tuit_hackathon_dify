    - data:
        code: "function toNumber(value, fallback = 0) {\n  const n = Number(value);\n  return Number.isFinite(n) ? n : fallback;\n\
          }\n\nfunction main({\n  normalizedProductCode,\n  normalizedUnitCode,\n  submittedPriceNumber,\n  fairLowNumber,\n\
          \  fairMidNumber,\n  fairHighNumber,\n  confidenceScore,\n  sampleCount,\n  surveyDate,\n  sourceBreakdownJson\n\
          }) {\n  const price = toNumber(submittedPriceNumber, 0);\n  const low = toNumber(fairLowNumber, 0);\n  const mid\
          \ = toNumber(fairMidNumber, 0);\n  const high = toNumber(fairHighNumber, 0);\n  const confidence = toNumber(confidenceScore,\
          \ 0);\n  const samples = toNumber(sampleCount, 0);\n\n  let riskLevel = \"LOW\";\n  let statusSuggestion = \"PENDING\"\
          ;\n  let needsHumanReview = false;\n  const reasons = [];\n\n  const ratioHigh = high > 0 ? price / high : 0;\n\
          \  const ratioLow = low > 0 ? price / low : 0;\n  const lowData = confidence < 0.5 || samples < 3;\n\n  if (price\
          \ > high * 2) {\n    riskLevel = \"HIGH\";\n    statusSuggestion = \"FLAGGED\";\n    needsHumanReview = true;\n\
          \    reasons.push(\"Submitted price is far above the recent fair range.\");\n    reasons.push(\"It may be a bulk\
          \ price, premium variant, or input error.\");\n  } else if (price < low * 0.5) {\n    riskLevel = \"HIGH\";\n  \
          \  statusSuggestion = \"FLAGGED\";\n    needsHumanReview = true;\n    reasons.push(\"Submitted price is far below\
          \ the recent fair range.\");\n    reasons.push(\"It may be a unit mismatch, discount, or input error.\");\n  } else\
          \ if (price > high) {\n    riskLevel = \"MEDIUM\";\n    statusSuggestion = \"REVIEW_REQUIRED\";\n    needsHumanReview\
          \ = true;\n    reasons.push(\"Submitted price is above the recent fair range.\");\n  } else if (price < low) {\n\
          \    riskLevel = \"MEDIUM\";\n    statusSuggestion = \"REVIEW_REQUIRED\";\n    needsHumanReview = true;\n    reasons.push(\"\
          Submitted price is below the recent fair range.\");\n  } else {\n    riskLevel = \"LOW\";\n    statusSuggestion\
          \ = \"PENDING\";\n    needsHumanReview = false;\n    reasons.push(\"Submitted price is within the recent fair range.\"\
          );\n  }\n\n  if (lowData) {\n    reasons.push(\"Recent data is limited, so this report should be used as reference\
          \ data.\");\n  }\n\n  const needsHumanReviewText = needsHumanReview ? \"true\" : \"false\";\n  const lowDataWarningText\
          \ = lowData ? \"true\" : \"false\";\n  const anomalyReasonsText = reasons.join(\"; \");\n\n  const ruleSummary =\
          \ [\n    `productCode=${normalizedProductCode}`,\n    `unit=${normalizedUnitCode}`,\n    `submittedPrice=${price}`,\n\
          \    `fairRange=${low}-${high}`,\n    `fairMid=${mid}`,\n    `confidenceScore=${confidence}`,\n    `sampleCount=${samples}`,\n\
          \    `surveyDate=${surveyDate || \"\"}`,\n    `sourceBreakdown=${sourceBreakdownJson || \"\"}`,\n    `riskLevel=${riskLevel}`,\n\
          \    `statusSuggestion=${statusSuggestion}`,\n    `needsHumanReview=${needsHumanReviewText}`,\n    `lowDataWarning=${lowDataWarningText}`\n\
          \  ].join(\"\\n\");\n\n  const reportInspectionContext = [\n    `Product code: ${normalizedProductCode}`,\n    `Submitted\
          \ unit: ${normalizedUnitCode}`,\n    `Submitted price: ${price}`,\n    `Recent fair range: ${low} - ${high}`,\n\
          \    `Recent fair midpoint: ${mid}`,\n    `Risk level: ${riskLevel}`,\n    `Status suggestion: ${statusSuggestion}`,\n\
          \    `Needs human review: ${needsHumanReviewText}`,\n    `Low data warning: ${lowDataWarningText}`,\n    `Anomaly\
          \ reasons: ${anomalyReasonsText}`,\n    `Confidence score: ${confidence}`,\n    `Sample count: ${samples}`,\n  \
          \  `Survey date: ${surveyDate || \"not provided\"}`,\n    `Source breakdown: ${sourceBreakdownJson || \"not provided\"\
          }`\n  ].join(\"\\n\");\n\n  return {\n    normalizedProductCode: normalizedProductCode || \"UNKNOWN\",\n    riskLevel,\n\
          \    statusSuggestion,\n    needsHumanReview,\n    needsHumanReviewText,\n    anomalyReasonsJson: JSON.stringify(reasons),\n\
          \    anomalyReasonsText,\n    ruleSummary,\n    lowDataWarning: lowData,\n    lowDataWarningText,\n    priceRatioToFairHigh:\
          \ ratioHigh,\n    priceRatioToFairLow: ratioLow,\n    reportInspectionContext\n  };\n}"
        code_language: javascript
