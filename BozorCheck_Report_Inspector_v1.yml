    - data:
        code: "function safeParseJson(text) {\n  if (!text) return null;\n\n  let cleaned = String(text).trim();\n\n  cleaned\
          \ = cleaned\n    .replace(/^```json\\s*/i, \"\")\n    .replace(/^```\\s*/i, \"\")\n    .replace(/```$/i, \"\")\n\
          \    .trim();\n\n  try {\n    return JSON.parse(cleaned);\n  } catch (e) {\n    return null;\n  }\n}\n\nfunction\
          \ removeForbiddenWords(text) {\n  if (!text) return \"\";\n\n  const replacements = [\n    [/scam/gi, \"unusual\"\
          ],\n    [/fraud/gi, \"unusual\"],\n    [/rip-off/gi, \"higher than usual\"],\n    [/cheating/gi, \"pricing difference\"\
          ],\n    [/bad seller/gi, \"pricing difference\"],\n    [/바가지/g, \"높은 편\"],\n    [/사기/g, \"가격 차이\"],\n    [/속았다/g,\
          \ \"다시 확인\"],\n    [/사지 마세요/g, \"품질과 가격을 한 번 더 확인해 보세요\"],\n    [/상인이 잘못했습니다/g, \"품목, 품질, 시장 상황에 따라 가격 차이가 있을 수\
          \ 있습니다\"],\n    [/обман\\p{L}*/giu, \"ценовое различие\"],\n    [/мошеннич\\p{L}*/giu, \"ценовое различие\"],\n\
          \    [/не покупайте/gi, \"сравните цены у соседних продавцов\"],\n    [/плохой продавец/gi, \"разница в ценах\"\
          ]\n  ];\n\n  let output = String(text);\n  for (const [pattern, replacement] of replacements) {\n    output = output.replace(pattern,\
          \ replacement);\n  }\n  return output;\n}\n\nfunction normalizeStatus(status) {\n  const allowed = [\"PENDING\"\
          , \"REVIEW_REQUIRED\", \"FLAGGED\", \"REJECT_CANDIDATE\"];\n  const normalized = String(status || \"\").trim().toUpperCase();\n\
          \n  if (normalized === \"APPROVED\") {\n    return \"REVIEW_REQUIRED\";\n  }\n\n  return allowed.includes(normalized)\
          \ ? normalized : \"REVIEW_REQUIRED\";\n}\n\nfunction main({\n  llmText,\n  normalizedProductCode,\n  riskLevel,\n\
          \  statusSuggestion,\n  needsHumanReview,\n  anomalyReasonsJson,\n  locale\n}) {\n  const parsed = safeParseJson(llmText)\
          \ || {};\n\n  const safeStatus = normalizeStatus(statusSuggestion);\n  const safeRisk = [\"LOW\", \"MEDIUM\", \"\
          HIGH\"].includes(String(riskLevel || \"\").toUpperCase())\n    ? String(riskLevel).toUpperCase()\n    : \"MEDIUM\"\
          ;\n\n  let reasons = [];\n  try {\n    reasons = JSON.parse(anomalyReasonsJson || \"[]\");\n  } catch (e) {\n  \
          \  reasons = [];\n  }\n\n  const isKorean = String(locale || \"\").toLowerCase().startsWith(\"ko\");\n\n  const\
          \ fallbackReviewNote = reasons.length > 0\n    ? reasons.join(\" \")\n    : \"Review this report against recent\
          \ reference data.\";\n\n  const fallbackUserMessage = isKorean\n    ? \"제보가 접수되었습니다. 검토 후 시세에 반영됩니다.\"\n    : \"\
          Your report was received and will be reviewed before it is used.\";\n\n  const reviewNote = removeForbiddenWords(parsed.reviewNote\
          \ || fallbackReviewNote);\n  const userMessage = removeForbiddenWords(parsed.userMessage || fallbackUserMessage);\n\
          \n  const checklist = Array.isArray(parsed.operatorChecklist)\n    ? parsed.operatorChecklist.map((item) => removeForbiddenWords(String(item))).slice(0,\
          \ 5)\n    : [\n        \"Check product variant.\",\n        \"Check submitted unit.\",\n        \"Compare with nearby\
          \ observations.\"\n      ];\n\n  return {\n    normalizedProductCode: normalizedProductCode || \"UNKNOWN\",\n  \
          \  riskLevel: safeRisk,\n    statusSuggestion: safeStatus,\n    needsHumanReview: String(Boolean(needsHumanReview\
          \ || safeStatus !== \"PENDING\")),\n    anomalyReasonsJson: JSON.stringify(reasons),\n    reviewNote,\n    userMessage,\n\
          \    operatorChecklistJson: JSON.stringify(checklist)\n  };\n}"
