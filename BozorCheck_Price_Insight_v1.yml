    - data:
        code: "function toNumber(value, fallback = 0) {\n  const n = Number(value);\n\
          \  return Number.isFinite(n) ? n : fallback;\n}\n\nfunction main({\n  locale,\n\
          \  productCode,\n  productName,\n  marketCode,\n  marketName,\n  quotedPrice,\n\
          \  unitCode,\n  backendVerdict,\n  fairLow,\n  fairMid,\n  fairHigh,\n \
          \ recommendedTargetPrice,\n  confidenceScore,\n  sampleCount,\n  sourceBreakdownJson,\n\
          \  marketComparisonJson,\n  surveyDate,\n  surveyLocation,\n  includeOptionalPhrase\n\
          }) {\n  const allowedVerdicts = [\n    \"VERY_CHEAP\",\n    \"CHEAP\",\n\
          \    \"FAIR\",\n    \"EXPENSIVE\",\n    \"VERY_EXPENSIVE\",\n    \"UNKNOWN\"\
          \n  ];\n\n  const code = String(productCode || \"\").trim().toUpperCase();\n\
          \  const market = String(marketCode || \"\").trim().toUpperCase();\n  const\
          \ unit = String(unitCode || \"\").trim().toUpperCase();\n\n  const price\
          \ = toNumber(quotedPrice, -1);\n  const low = toNumber(fairLow, 0);\n  const\
          \ mid = toNumber(fairMid, 0);\n  const high = toNumber(fairHigh, 0);\n \
          \ const target = toNumber(recommendedTargetPrice, mid);\n  const confidence\
          \ = toNumber(confidenceScore, 0);\n  const samples = toNumber(sampleCount,\
          \ 0);\n\n  let verdict = String(backendVerdict || \"\").trim().toUpperCase();\n\
          \  if (!allowedVerdicts.includes(verdict)) {\n    verdict = \"UNKNOWN\"\
          ;\n  }\n\n  let isValidContext = true;\n  let invalidReason = \"\";\n\n\
          \  if (!code || code === \"UNKNOWN\") {\n    isValidContext = false;\n \
          \   invalidReason = \"Missing or unknown product code.\";\n  } else if (!market)\
          \ {\n    isValidContext = false;\n    invalidReason = \"Missing market code.\"\
          ;\n  } else if (!unit) {\n    isValidContext = false;\n    invalidReason\
          \ = \"Missing unit code.\";\n  } else if (price <= 0) {\n    isValidContext\
          \ = false;\n    invalidReason = \"Quoted price must be greater than zero.\"\
          ;\n  } else if (low <= 0 || mid <= 0 || high <= 0) {\n    isValidContext\
          \ = false;\n    invalidReason = \"Missing backend fair price range.\";\n\
          \  }\n\n  const lowData = confidence < 0.5 || samples < 3;\n\n  let pricePosition\
          \ = \"UNKNOWN\";\n  if (price > high) {\n    pricePosition = \"ABOVE_FAIR_RANGE\"\
          ;\n  } else if (price < low) {\n    pricePosition = \"BELOW_FAIR_RANGE\"\
          ;\n  } else if (price >= low && price <= high) {\n    pricePosition = \"\
          WITHIN_FAIR_RANGE\";\n  }\n\n  const includeOptional =\n    String(includeOptionalPhrase\
          \ || \"false\").toLowerCase() === \"true\";\n\n  const lowDataWarningText\
          \ = lowData ? \"true\" : \"false\";\n  const includeOptionalPhraseText =\
          \ includeOptional ? \"true\" : \"false\";\n\n  const priceContextText =\
          \ [\n    `Locale: ${locale || \"en\"}`,\n    `Product code: ${code}`,\n\
          \    `Product name: ${productName || code}`,\n    `Market code: ${market}`,\n\
          \    `Market name: ${marketName || market}`,\n    `Quoted price: ${price}`,\n\
          \    `Unit code: ${unit}`,\n    `Backend verdict: ${verdict}`,\n    `Fair\
          \ low: ${low}`,\n    `Fair mid: ${mid}`,\n    `Fair high: ${high}`,\n  \
          \  `Recommended target price: ${target}`,\n    `Price position: ${pricePosition}`,\n\
          \    `Confidence score: ${confidence}`,\n    `Sample count: ${samples}`,\n\
          \    `Low data warning: ${lowDataWarningText}`,\n    `Source breakdown:\
          \ ${sourceBreakdownJson || \"not provided\"}`,\n    `Market comparison:\
          \ ${marketComparisonJson || \"not provided\"}`,\n    `Survey date: ${surveyDate\
          \ || \"not provided\"}`,\n    `Survey location: ${surveyLocation || \"not\
          \ provided\"}`,\n    `Include optional phrase: ${includeOptionalPhraseText}`,\n\
          \    `Invalid context reason: ${invalidReason || \"none\"}`\n  ].join(\"\
          \\n\");\n\n  const retrievalQuery = [\n    `price insight explanation`,\n\
          \    `product: ${productName || code}`,\n    `productCode: ${code}`,\n \
          \   `market: ${marketName || market}`,\n    `unit: ${unit}`,\n    `backend\
          \ verdict: ${verdict}`,\n    `price position: ${pricePosition}`,\n    `low\
          \ data warning: ${lowDataWarningText}`,\n    `source: ${sourceBreakdownJson\
          \ || \"\"}`,\n    `market comparison: ${marketComparisonJson || \"\"}`,\n\
          \    `survey date: ${surveyDate || \"\"}`,\n    `copy safety seller blame\
          \ low data warning`\n  ].join(\"\\n\");\n\n  return {\n    isValidContext,\n\
          \    invalidReason,\n    normalizedVerdict: verdict,\n    lowDataWarning:\
          \ lowData,\n    lowDataWarningText,\n    includeOptionalPhraseText,\n  \
          \  pricePosition,\n    priceContextText,\n    retrievalQuery\n  };\n}"
        code_language: javascript
