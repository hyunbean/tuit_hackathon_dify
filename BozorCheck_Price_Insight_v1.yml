    - data:
        code: "function safeParseJson(text) {\n  if (!text) return null;\n\n  let\
          \ cleaned = String(text).trim();\n\n  cleaned = cleaned\n    .replace(/^```json\\\
          s*/i, \"\")\n    .replace(/^```\\s*/i, \"\")\n    .replace(/```$/i, \"\"\
          )\n    .trim();\n\n  try {\n    return JSON.parse(cleaned);\n  } catch (e)\
          \ {\n    return null;\n  }\n}\n\nfunction hasForbiddenWords(text) {\n  const\
          \ value = String(text || \"\");\n  const patterns = [\n    /scam/i,\n  \
          \  /fraud/i,\n    /rip-off/i,\n    /cheating/i,\n    /bad seller/i,\n  \
          \  /do not buy/i,\n    /바가지/g,\n    /사기/g,\n    /속았다/g,\n    /사지 마세요/g,\n\
          \    /상인이 잘못/g,\n    /обман/i,\n    /мошеннич/i,\n    /не покупайте/i,\n\
          \    /плохой продавец/i\n  ];\n  return patterns.some((p) => p.test(value));\n\
          }\n\nfunction removeForbiddenWords(text) {\n  if (!text) return \"\";\n\n\
          \  const replacements = [\n    [/scam/gi, \"unusual pricing\"],\n    [/fraud/gi,\
          \ \"pricing difference\"],\n    [/rip-off/gi, \"higher than usual\"],\n\
          \    [/cheating/gi, \"pricing difference\"],\n    [/bad seller/gi, \"pricing\
          \ difference\"],\n    [/do not buy/gi, \"compare with nearby sellers\"],\n\
          \    [/바가지/g, \"높은 편\"],\n    [/사기/g, \"가격 차이\"],\n    [/속았다/g, \"다시 확인\"\
          ],\n    [/사지 마세요/g, \"다른 가게와 비교해 보세요\"],\n    [/상인이 잘못했습니다/g, \"품목, 품질,\
          \ 시장 상황에 따라 가격 차이가 있을 수 있습니다\"],\n    [/상인이 잘못/g, \"시장 상황에 따라 가격 차이가 있을\
          \ 수 있음\"],\n    [/обман\\p{L}*/giu, \"ценовое различие\"],\n    [/мошеннич\\\
          p{L}*/giu, \"ценовое различие\"],\n    [/не покупайте/gi, \"сравните цены\
          \ у соседних продавцов\"],\n    [/плохой продавец/gi, \"разница в ценах\"\
          ]\n  ];\n\n  let output = String(text);\n  for (const [pattern, replacement]\
          \ of replacements) {\n    output = output.replace(pattern, replacement);\n\
          \  }\n  return output;\n}\n\nfunction main({\n  llmText,\n  isValidContext,\n\
          \  invalidReason,\n  backendVerdict,\n  priceContextText,\n  lowDataWarning,\n\
          \  lowDataWarningText,\n  includeOptionalPhraseText,\n  surveyDate\n}) {\n\
          \  const parsed = safeParseJson(llmText) || {};\n  const expectedVerdict\
          \ = String(backendVerdict || \"UNKNOWN\").trim().toUpperCase();\n\n  const\
          \ isValid =\n    isValidContext === true ||\n    String(isValidContext ||\
          \ \"\").toLowerCase() === \"true\";\n\n  const isLowData =\n    lowDataWarning\
          \ === true ||\n    String(lowDataWarningText || \"\").toLowerCase() ===\
          \ \"true\";\n\n  const includeOptional =\n    String(includeOptionalPhraseText\
          \ || \"false\").toLowerCase() === \"true\";\n\n  const changedBackendVerdict\
          \ =\n    parsed.backendVerdictEcho &&\n    String(parsed.backendVerdictEcho).trim().toUpperCase()\
          \ !== expectedVerdict;\n\n  const textBlob = [\n    parsed.insightText,\n\
          \    parsed.confidenceExplanation,\n    parsed.sourceSummary,\n    parsed.marketComparisonInsight,\n\
          \    parsed.recommendedAction,\n    parsed.optionalBargainPhrase\n  ].join(\"\
          \ \");\n\n  const hadSellerBlame = hasForbiddenWords(textBlob);\n\n  const\
          \ fallbackSource = surveyDate\n    ? `Based on ${surveyDate} field survey/reference\
          \ data.`\n    : \"Based on backend price data.\";\n\n  let insightText =\
          \ parsed.insightText || \"This price was checked against the current backend\
